<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center;
        }
        h2 { margin-bottom: 25px; color: #1e293b; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input {
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px;
            outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: #6366f1; ring: 2px solid #6366f1; }
        .btn {
            width: 100%; background: #6366f1; color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { background: #4f46e5; }
        .link { margin-top: 20px; display: block; color: #64748b; text-decoration: none; font-size: 14px; }
        .link b { color: #6366f1; }
    </style>
</head>
<div class="auth-card">
    <h2>Ro'yxatdan o'tish</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="input-group">
            <input type="text" name="username" placeholder="Login yarating" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Kuchli parol yarating" required>
        </div>
        <div class="input-group">
            <input type="password" name="password2" placeholder="Parolni qayta kiriting" required>
        </div>
        <button type="submit" class="btn">Hisob ochish</button>
    </form>
    <a href="/login/" class="link">Akkauntingiz bormi? <b>Kirish</b></a>
</div>
